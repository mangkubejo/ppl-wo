<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>PPL Routine · 2×10kg Dumbbell</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0b0e;--s1:#131318;--s2:#1a1a22;--s3:#22222c;
  --bd:rgba(255,255,255,0.07);--tx:#eeedf2;--mu:#8888a0;--fa:#44445a;
  --push:#ff4d1c;--pull:#1e88e5;--legs:#00c853;--iso:#9c5cf7;--gold:#ffc107;
}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}

/* HERO */
.hero{padding:52px 20px 36px;text-align:center;position:relative;overflow:hidden}
.hero::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 50% 0,rgba(255,77,28,0.1) 0,transparent 70%);pointer-events:none}
.hero-label{font-size:11px;letter-spacing:0.22em;text-transform:uppercase;color:var(--mu);font-weight:500;margin-bottom:10px}
.hero-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:clamp(72px,18vw,110px);line-height:0.9;letter-spacing:-0.01em;text-transform:uppercase}
.hero-title span{color:var(--push)}
.hero-sub{font-size:14px;color:var(--mu);font-weight:300;margin-top:14px;letter-spacing:0.02em}
.hero-badges{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-top:18px}
.hbadge{font-size:11px;font-weight:500;color:var(--mu);background:var(--s1);border:1px solid var(--bd);border-radius:99px;padding:4px 12px}

/* SCHEDULE STRIP */
.schedule{display:flex;gap:5px;overflow-x:auto;padding:0 20px 28px;scrollbar-width:none;justify-content:center}
.schedule::-webkit-scrollbar{display:none}
.sday{flex-shrink:0;background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:10px 12px;text-align:center;min-width:66px;cursor:pointer;transition:transform .15s,border-color .2s}
.sday:hover{transform:translateY(-2px)}
.sday-dot{width:7px;height:7px;border-radius:50%;margin:0 auto 6px}
.sday-n{font-size:9.5px;color:var(--fa);letter-spacing:.08em;text-transform:uppercase;margin-bottom:3px}
.sday-l{font-size:12px;font-weight:500}
.sday.push{border-color:rgba(255,77,28,.22)}.sday.push .sday-dot{background:var(--push)}.sday.push .sday-l{color:rgba(255,99,55,.95)}
.sday.pull{border-color:rgba(30,136,229,.22)}.sday.pull .sday-dot{background:var(--pull)}.sday.pull .sday-l{color:rgba(60,155,240,.95)}
.sday.legs{border-color:rgba(0,200,83,.22)}.sday.legs .sday-dot{background:var(--legs)}.sday.legs .sday-l{color:rgba(30,210,90,.95)}
.sday.rest-day{opacity:.4}.sday.rest-day .sday-dot{background:var(--fa)}

/* TABS */
.tabs-outer{padding:0 20px 20px}
.tabs{display:flex;background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:4px;max-width:440px;margin:0 auto;gap:3px}
.tab{flex:1;background:transparent;border:none;border-radius:9px;padding:10px 6px 8px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:var(--mu);transition:all .2s;line-height:1}
.tab .dot{display:block;width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.3;margin:0 auto 5px;transition:opacity .2s}
.tab.active{background:var(--s2)}.tab.active .dot{opacity:1}
.tab[data-d="push"].active{color:var(--push)}.tab[data-d="pull"].active{color:var(--pull)}
.tab[data-d="legs"].active{color:var(--legs)}.tab[data-d="rest"].active{color:var(--mu)}

/* PANELS */
.panel{display:none;padding:0 20px 60px;max-width:600px;margin:0 auto}
.panel.active{display:block;animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateX(8px)}to{opacity:1;transform:translateX(0)}}
.panel-head{margin-bottom:22px;padding-bottom:16px;border-bottom:1px solid var(--bd)}
.panel-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:44px;line-height:1;text-transform:uppercase;letter-spacing:.02em}
.panel-title.push{color:var(--push)}.panel-title.pull{color:var(--pull)}.panel-title.legs{color:var(--legs)}
.panel-sub{font-size:13px;color:var(--mu);margin-top:4px}
.sec-label{font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--fa);margin:20px 0 8px}

/* EXERCISE CARD */
.ex-card{background:var(--s1);border:1px solid var(--bd);border-radius:14px;margin-bottom:8px;overflow:hidden;transition:border-color .2s}
.ex-card:hover{border-color:rgba(255,255,255,.12)}
.ex-top{display:grid;grid-template-columns:115px 1fr;min-height:108px}
.ex-fig-wrap{background:var(--s2);display:flex;align-items:center;justify-content:center;padding:10px;border-right:1px solid var(--bd)}
.ex-fig-wrap svg{width:100%;height:auto;max-height:95px}
.ex-info{padding:14px 15px;display:flex;flex-direction:column;justify-content:center;gap:5px}
.ex-name-row{display:flex;align-items:flex-start;gap:6px;flex-wrap:wrap}
.ex-name{font-size:13.5px;font-weight:600;line-height:1.3;flex:1;min-width:0}
.iso-tag{font-size:9.5px;font-weight:600;letter-spacing:.06em;padding:2px 7px;border-radius:99px;background:rgba(156,92,247,.15);color:var(--iso);white-space:nowrap;margin-top:1px}
.ex-muscle{font-size:11px;color:var(--mu)}
.ex-metrics{display:flex;gap:10px;align-items:center}
.ex-sets{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;letter-spacing:.03em}
.ex-sets.push{color:var(--push)}.ex-sets.pull{color:var(--pull)}.ex-sets.legs{color:var(--legs)}
.ex-rest{font-size:11px;color:var(--fa)}

/* PROGRESSIVE OVERLOAD */
.ex-po{border-top:1px solid var(--bd);padding:11px 14px;background:rgba(0,0,0,.2)}
.po-row{display:flex;align-items:center;gap:8px}
.po-stage{font-size:11px;font-weight:700;color:var(--gold);white-space:nowrap;letter-spacing:.03em}
.po-desc{flex:1;font-size:11.5px;color:var(--mu);min-width:0}
.po-btns{display:flex;gap:4px;flex-shrink:0}
.po-btn{width:28px;height:28px;border-radius:7px;border:1px solid var(--bd);background:var(--s3);color:var(--tx);font-size:17px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s, transform .1s;font-family:monospace}
.po-btn:hover{background:var(--fa)}.po-btn:active{transform:scale(.88)}
.po-dots{display:flex;gap:3px;margin-top:8px}
.po-dot{flex:1;height:3px;border-radius:2px;background:var(--s3);transition:background .3s}
.po-dot.filled{background:rgba(255,193,7,.5)}.po-dot.current{background:var(--gold)}
.ex-cue{font-size:11.5px;color:var(--mu);margin-top:7px;font-style:italic;line-height:1.5}

/* REST PANEL */
.rest-center{text-align:center;padding:48px 0 28px}
.rest-emoji{font-size:54px;display:block;margin-bottom:14px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.rest-ttl{font-family:'Barlow Condensed',sans-serif;font-size:46px;font-weight:800;color:var(--mu);text-transform:uppercase;letter-spacing:.03em;margin-bottom:10px}
.rest-txt{font-size:13.5px;color:var(--fa);line-height:1.7;max-width:280px;margin:0 auto}
.rec-card{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:16px;margin-top:16px}
.rec-row{display:flex;gap:10px;margin-bottom:10px;font-size:13px;color:var(--mu);line-height:1.6}
.rec-row:last-child{margin-bottom:0}
.rec-icon{font-size:16px;flex-shrink:0;margin-top:1px}

/* PO GUIDE */
.po-guide{padding:0 20px 50px;max-width:600px;margin:0 auto}
.po-guide-title{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--gold);margin-bottom:10px}
.po-guide-sub{font-size:13px;color:var(--mu);line-height:1.65;margin-bottom:14px}
.po-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.po-item{background:var(--s1);border:1px solid rgba(255,193,7,.14);border-radius:12px;padding:14px 12px;text-align:center}
.po-item-n{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:800;color:var(--gold);line-height:1;margin-bottom:4px}
.po-item-t{font-size:11.5px;color:var(--mu);line-height:1.4}

/* FOOTER */
footer{text-align:center;padding:28px 20px;border-top:1px solid var(--bd);font-size:12px;color:var(--fa);line-height:1.8}

@media(max-width:380px){
  .ex-top{grid-template-columns:90px 1fr}
  .ex-fig-wrap{padding:8px}
  .po-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-label">Dumbbell 2 × 10kg · Bench</div>
  <h1 class="hero-title">PPL<br><span>Routine</span></h1>
  <p class="hero-sub">Push · Pull · Legs · Rest — Cycle berulang</p>
  <div class="hero-badges">
    <span class="hbadge">~50–65 menit</span>
    <span class="hbadge">18 latihan</span>
    <span class="hbadge">Isolation per otot</span>
    <span class="hbadge">Progressive overload</span>
  </div>
</div>

<div class="schedule" id="schedule"></div>

<div class="tabs-outer">
  <div class="tabs">
    <button class="tab active" data-d="push" onclick="switchDay('push')"><span class="dot"></span>Push</button>
    <button class="tab" data-d="pull" onclick="switchDay('pull')"><span class="dot"></span>Pull</button>
    <button class="tab" data-d="legs" onclick="switchDay('legs')"><span class="dot"></span>Legs</button>
    <button class="tab" data-d="rest" onclick="switchDay('rest')"><span class="dot"></span>Rest</button>
  </div>
</div>

<div id="panels"></div>
<div class="po-guide" id="po-guide"></div>

<footer>
  PPL Routine · Dumbbell 2×10kg + Bench<br>
  <span style="font-size:11px">Ketuk <strong style="color:var(--gold)">+</strong> di tiap latihan untuk advance ke tier berikutnya</span>
</footer>

<script>
// ─── SVG HELPER FUNCTIONS ───────────────────────────────
const H = (cx,cy,r=9) =>
  `<circle cx="${cx}" cy="${cy}" r="${r}" fill="rgba(255,255,255,0.92)"/>`;
const L = (x1,y1,x2,y2,w=4) =>
  `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="rgba(255,255,255,0.85)" stroke-width="${w}" stroke-linecap="round" stroke-linejoin="round"/>`;
const DB = (x,y,rot=0) =>
  `<g transform="translate(${x},${y}) rotate(${rot})">
    <rect x="-11" y="-3" width="22" height="6" rx="2.5" fill="rgba(255,255,255,0.88)"/>
    <rect x="-16" y="-6" width="6" height="12" rx="1.5" fill="rgba(255,255,255,0.58)"/>
    <rect x="10" y="-6" width="6" height="12" rx="1.5" fill="rgba(255,255,255,0.58)"/>
  </g>`;
const BENCH = (x=5,y=70,w=155) =>
  `<rect x="${x}" y="${y}" width="${w}" height="8" rx="3.5" fill="rgba(255,255,255,0.18)"/>
   <rect x="${x+14}" y="${y+8}" width="6" height="20" rx="2" fill="rgba(255,255,255,0.1)"/>
   <rect x="${x+w-20}" y="${y+8}" width="6" height="20" rx="2" fill="rgba(255,255,255,0.1)"/>`;
const LEGS = (cx=60,hy=78) =>
  `${L(cx,hy,cx-14,110,4.5)}${L(cx-14,110,cx-16,128,4.5)}${L(cx,hy,cx+14,110,4.5)}${L(cx+14,110,cx+16,128,4.5)}`;

// ─── SVG ILLUSTRATIONS ──────────────────────────────────
const SVGS = {};

// 1. BENCH PRESS — arms translate up/down while lying
SVGS['bench-press'] = `<svg viewBox="0 0 170 108" fill="none">
<style>.bp{animation:bpm 1.8s ease-in-out infinite alternate;}@keyframes bpm{0%{transform:translateY(0)}100%{transform:translateY(-20px)}}</style>
${BENCH(5,68,158)}
${L(128,62,40,62,8)}${H(145,54,10)}
<g class="bp">
  ${L(57,62,48,40,4)}${L(96,62,87,40,4)}
  ${DB(40,35)}${DB(79,35)}
</g></svg>`;

// 2. INCLINE DB PRESS — arms translate at angle
SVGS['incline-press'] = `<svg viewBox="0 0 175 118" fill="none">
<style>.ip{animation:ipm 1.8s ease-in-out infinite alternate;}@keyframes ipm{0%{transform:translateY(0)}100%{transform:translateY(-18px)}}</style>
<rect x="10" y="60" width="138" height="8" rx="3" transform="rotate(-18 10 60)" fill="rgba(255,255,255,0.18)"/>
<rect x="130" y="84" width="6" height="24" rx="2" fill="rgba(255,255,255,0.1)"/>
<rect x="22" y="66" width="6" height="24" rx="2" fill="rgba(255,255,255,0.1)"/>
${L(118,54,38,78,7)}${H(132,46,10)}
<g class="ip">
  ${L(70,64,57,43,4)}${L(99,57,86,36,4)}
  ${DB(50,38)}${DB(78,31)}
</g></svg>`;

// 3. SHOULDER PRESS — arms push overhead
SVGS['shoulder-press'] = `<svg viewBox="0 0 120 148" fill="none">
<style>.sp{animation:spm 1.8s ease-in-out infinite alternate;}@keyframes spm{0%{transform:translateY(0)}100%{transform:translateY(-20px)}}</style>
${H(60,18)}${L(60,27,60,78,5.5)}${LEGS()}
${L(60,38,40,56,4)}${L(40,56,34,72,3.5)}${DB(28,76)}
<g class="sp">
  ${L(60,38,80,52,4)}${L(80,52,88,36,3.5)}${DB(91,30,10)}
</g></svg>`;

// 4. LATERAL RAISE — arms rotate from horizontal downward
SVGS['lateral-raise'] = `<svg viewBox="0 0 168 148" fill="none">
<style>
.lr-l{animation:lrl 2s ease-in-out infinite alternate;transform-box:fill-box;transform-origin:100% 0%;}
.lr-r{animation:lrr 2s ease-in-out infinite alternate;transform-box:fill-box;transform-origin:0% 0%;}
@keyframes lrl{0%{transform:rotate(0deg)}100%{transform:rotate(52deg)}}
@keyframes lrr{0%{transform:rotate(0deg)}100%{transform:rotate(-52deg)}}
</style>
${H(84,18)}${L(84,27,84,78,5.5)}${LEGS(84)}
<g class="lr-l">${L(84,37,30,37,4)}${DB(20,37)}</g>
<g class="lr-r">${L(84,37,138,37,4)}${DB(148,37)}</g>
</svg>`;

// 5. CHEST FLY — lying, arms open/close
SVGS['chest-fly'] = `<svg viewBox="0 0 200 108" fill="none">
<style>
.cf-l{animation:cfl 2s ease-in-out infinite alternate;}
.cf-r{animation:cfr 2s ease-in-out infinite alternate;}
@keyframes cfl{0%{transform:translateX(0)}100%{transform:translateX(12px)}}
@keyframes cfr{0%{transform:translateX(0)}100%{transform:translateX(-12px)}}
</style>
${BENCH(18,68,162)}
${L(148,61,58,61,7)}${H(162,54,10)}
<g class="cf-l">${L(74,61,44,38,4)}${DB(35,33)}</g>
<g class="cf-r">${L(114,61,143,38,4)}${DB(152,33)}</g>
</svg>`;

// 6. OVERHEAD TRICEP EXTENSION — forearm folds/extends behind head
SVGS['tricep-ext'] = `<svg viewBox="0 0 120 150" fill="none">
<style>
.te{animation:tem 1.8s ease-in-out infinite alternate;transform-box:fill-box;transform-origin:0% 0%;}
@keyframes tem{0%{transform:rotate(0deg)}100%{transform:rotate(-65deg)}}
</style>
${H(60,18)}${L(60,27,60,78,5.5)}${LEGS()}
${L(60,38,52,26,4)}${L(52,26,54,14,3.5)}${DB(54,8)}
${L(60,38,68,26,4)}
<g class="te">${L(68,26,78,38,3.5)}${DB(82,40,-20)}</g>
</svg>`;

// 7. BENT-OVER ROW — arms pull up while torso is bent
SVGS['bent-row'] = `<svg viewBox="0 0 145 142" fill="none">
<style>.br{animation:brm 1.8s ease-in-out infinite alternate;}@keyframes brm{0%{transform:translateY(0)}100%{transform:translateY(-16px)}}</style>
${H(118,28,9)}
${L(110,37,32,70,5.5)}
${L(32,70,28,100,5)}${L(28,100,26,118,4.5)}
${L(42,74,48,102,5)}${L(48,102,46,118,4.5)}
<g class="br">
  ${L(62,56,52,36,4)}${L(92,65,82,45,4)}
  ${DB(44,31)}${DB(74,40)}
</g></svg>`;

// 8. SINGLE-ARM ROW — one arm pulls while knee on bench
SVGS['single-row'] = `<svg viewBox="0 0 168 118" fill="none">
<style>.sar{animation:sarm 1.8s ease-in-out infinite alternate;}@keyframes sarm{0%{transform:translateY(0)}100%{transform:translateY(-18px)}}</style>
${BENCH(5,72,78)}
${H(122,22,9)}
${L(114,30,52,58,5)}
${L(52,58,48,80,5)}${L(44,60,50,80,5)}
${L(52,58,40,64,4)}
<g class="sar">${L(112,38,120,18,4)}${DB(122,12)}</g>
</svg>`;

// 9. ROMANIAN DEADLIFT — torso hinges forward
SVGS['rdl'] = `<svg viewBox="0 0 130 148" fill="none">
<style>
.rd-top{animation:rdm 2s ease-in-out infinite alternate;transform-box:fill-box;transform-origin:50% 86%;}
@keyframes rdm{0%{transform:rotate(0deg)}100%{transform:rotate(30deg)}}
</style>
<g class="rd-top">
  ${H(80,18,9)}
  ${L(72,27,48,68,5.5)}
  ${L(64,35,46,54,4)}${DB(37,58)}
  ${L(64,35,82,48,4)}${DB(90,52)}
</g>
${L(48,68,44,100,5)}${L(44,100,42,120,4.5)}
${L(48,68,58,100,5)}${L(58,100,56,120,4.5)}
</svg>`;

// 10. BICEP CURL — forearm rotates up from elbow
SVGS['bicep-curl'] = `<svg viewBox="0 0 120 148" fill="none">
<style>
.bc{animation:bcm 1.6s ease-in-out infinite alternate;transform-box:fill-box;transform-origin:0% 0%;}
@keyframes bcm{0%{transform:rotate(0deg)}100%{transform:rotate(-88deg)}}
</style>
${H(60,18)}${L(60,27,60,78,5.5)}${LEGS()}
${L(60,37,40,56,4)}${L(40,56,36,74,3.5)}${DB(30,78,-8)}
${L(60,37,80,52,4)}
<g class="bc">${L(80,52,88,70,3.5)}${DB(92,68,15)}</g>
</svg>`;

// 11. HAMMER CURL — same motion, vertical dumbbell orientation
SVGS['hammer-curl'] = `<svg viewBox="0 0 120 148" fill="none">
<style>
.hc{animation:hcm 1.6s ease-in-out infinite alternate;transform-box:fill-box;transform-origin:0% 0%;}
@keyframes hcm{0%{transform:rotate(0deg)}100%{transform:rotate(-88deg)}}
</style>
${H(60,18)}${L(60,27,60,78,5.5)}${LEGS()}
${L(60,37,40,56,4)}${L(40,56,36,74,3.5)}
<g transform="translate(29,76) rotate(90)">
  <rect x="-10" y="-2.5" width="20" height="5" rx="2" fill="rgba(255,255,255,0.88)"/>
  <rect x="-14" y="-5" width="5" height="10" rx="1.5" fill="rgba(255,255,255,0.58)"/>
  <rect x="9" y="-5" width="5" height="10" rx="1.5" fill="rgba(255,255,255,0.58)"/>
</g>
${L(60,37,80,52,4)}
<g class="hc">
  ${L(80,52,88,70,3.5)}
  <g transform="translate(91,67) rotate(-80)">
    <rect x="-10" y="-2.5" width="20" height="5" rx="2" fill="rgba(255,255,255,0.88)"/>
    <rect x="-14" y="-5" width="5" height="10" rx="1.5" fill="rgba(255,255,255,0.58)"/>
    <rect x="9" y="-5" width="5" height="10" rx="1.5" fill="rgba(255,255,255,0.58)"/>
  </g>
</g>
</svg>`;

// 12. REAR DELT FLY — arms open sideways while bent over
SVGS['rear-fly'] = `<svg viewBox="0 0 178 138" fill="none">
<style>
.rf-l{animation:rfl 2s ease-in-out infinite alternate;transform-box:fill-box;transform-origin:100% 0%;}
.rf-r{animation:rfr 2s ease-in-out infinite alternate;transform-box:fill-box;transform-origin:0% 0%;}
@keyframes rfl{0%{transform:rotate(0deg)}100%{transform:rotate(-42deg)}}
@keyframes rfr{0%{transform:rotate(0deg)}100%{transform:rotate(42deg)}}
</style>
${H(142,22,9)}
${L(134,30,56,60,5.5)}
${L(56,60,52,88,5)}${L(52,88,50,108,4.5)}
${L(64,66,66,92,5)}${L(66,92,64,108,4.5)}
<g class="rf-l">${L(88,48,52,42,4)}${DB(42,40,18)}</g>
<g class="rf-r">${L(112,55,148,46,4)}${DB(157,43,-18)}</g>
</svg>`;

// 13. GOBLET SQUAT — ghost crossfade stand ↔ squat
SVGS['goblet-squat'] = `<svg viewBox="0 0 120 148" fill="none">
<style>
.gs-a{animation:gsa 2.2s ease-in-out infinite alternate;}
.gs-b{animation:gsb 2.2s ease-in-out infinite alternate;}

// ─── PROGRESSIVE OVERLOAD HELPERS ───────────────────────
function getTier(id) { return parseInt(localStorage.getItem('t_'+id)||'0'); }
function saveTier(id, n) { localStorage.setItem('t_'+id, Math.max(0, Math.min(6, n))); }

// ─── RENDERING ───────────────────────────────────────────
function renderCard(ex, day) {
  const tier = getTier(ex.id);
  const cur = ex.tiers[tier];
  const iso = ex.type === 'iso';
  const dots = ex.tiers.map((_,i) =>
    `<div class="po-dot ${i<tier?'filled':i===tier?'current':''}"></div>`
  ).join('');

  return `<div class="ex-card" id="card-${ex.id}">
  <div class="ex-top">
    <div class="ex-fig-wrap">${SVGS[ex.svg]||''}</div>
    <div class="ex-info">
      <div class="ex-name-row">
        <div class="ex-name">${ex.name}</div>
        ${iso?'<div class="iso-tag">ISO</div>':''}
      </div>
      <div class="ex-muscle">${ex.target}</div>
      <div class="ex-metrics">
        <div class="ex-sets ${day}">${ex.sets} × ${ex.reps}</div>
        <div class="ex-rest">Rest ${ex.rest}s</div>
      </div>
    </div>
  </div>
  <div class="ex-po">
    <div class="po-row">
      <div class="po-stage">${cur.label}</div>
      <div class="po-desc">${cur.note}</div>
      <div class="po-btns">
        <button class="po-btn" onclick="chgTier('${ex.id}',-1,'${day}')">−</button>
        <button class="po-btn" onclick="chgTier('${ex.id}',1,'${day}')">+</button>
      </div>
    </div>
    <div class="po-dots">${dots}</div>
    <div class="ex-cue">"${ex.cue}"</div>
  </div>
</div>`;
}

function chgTier(id, delta, day) {
  saveTier(id, getTier(id) + delta);
  const allEx = [...DATA.push,...DATA.pull,...DATA.legs];
  const ex = allEx.find(e=>e.id===id);
  const el = document.getElementById('card-'+id);
  if (el && ex) {
    const tmp = document.createElement('div');
    tmp.innerHTML = renderCard(ex, day);
    el.replaceWith(tmp.firstElementChild);
  }
}

function renderPanel(day) {
  if (day === 'rest') return `
    <div class="rest-center">
      <span class="rest-emoji">🛌</span>
      <div class="rest-ttl">Rest Day</div>
      <p class="rest-txt">Otot tumbuh saat istirahat. Tidur dan nutrisi adalah bagian dari program ini.</p>
    </div>
    <div class="rec-card">
      <div class="rec-row"><span class="rec-icon">💤</span><span>Tidur 7–8 jam. Growth hormone dilepas saat deep sleep.</span></div>
      <div class="rec-row"><span class="rec-icon">🥩</span><span>Protein 1.6–2g per kg berat badan per hari untuk muscle synthesis.</span></div>
      <div class="rec-row"><span class="rec-icon">🚶</span><span>Jalan santai atau stretching 15–20 menit — active recovery boleh.</span></div>
      <div class="rec-row"><span class="rec-icon">💧</span><span>Hidrasi cukup. Otot yang dehidrasi performanya turun signifikan.</span></div>
    </div>`;

  const exs = DATA[day];
  const titles = {push:'Push Day',pull:'Pull Day',legs:'Legs Day'};
  const subs = {push:'Dada · Bahu · Trisep',pull:'Punggung · Bisep · Rear Delt',legs:'Paha · Glute · Betis'};
  const compound = exs.filter(e=>e.type==='compound');
  const iso = exs.filter(e=>e.type==='iso');
  return `
    <div class="panel-head">
      <div class="panel-title ${day}">${titles[day]}</div>
      <div class="panel-sub">${subs[day]}</div>
    </div>
    <div class="sec-label">Compound</div>
    ${compound.map(e=>renderCard(e,day)).join('')}
    <div class="sec-label">Isolation</div>
    ${iso.map(e=>renderCard(e,day)).join('')}`;
}

// ─── TAB SWITCHING ────────────────────────────────────────
function switchDay(day) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.d===day));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+day).classList.add('active');
  window.scrollTo({top:document.querySelector('.tabs-outer').offsetTop-12,behavior:'smooth'});
}
